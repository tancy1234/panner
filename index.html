<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
}

/* Rotated container */
.led-screen{
    position:absolute;
    top:50%;
    left:50%;

    width:100vh;
    height:100vw;

    transform:translate(-50%, -50%) rotate(90deg);
    transform-origin:center center;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;
}

.led-panel{
    width:95%;
    height:30%;
    background:#111;
    border:5px solid #333;
    overflow:hidden;

    display:flex;
    align-items:center;
}

.led-text{
    white-space:nowrap;
    color:red;
    font-size:12vw;
    font-weight:bold;

    text-shadow:
        0 0 5px red,
        0 0 10px red,
        0 0 20px red;

    animation:scroll 8s linear infinite;
}

@keyframes scroll{
    from{
        transform:translateX(100%);
    }
    to{
        transform:translateX(-100%);
    }
}
</style>
</head>
<body>

<div class="led-screen">
    <div class="led-panel">
        <div class="led-text">
            Jackson 拿下胜利！！！
        </div>
    </div>
</div>

</body>
</html>
